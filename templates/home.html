{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1>🛍 Welcome to MultiVendor Shop</h1>
    <p class="lead">Buy from multiple vendors in one place.</p>

    {% if not user.is_authenticated %}
        <a href="/users/register/customer/" class="btn btn-primary me-2">Shop Now</a>
        <a href="/users/register/vendor/" class="btn btn-success">Start Selling</a>
    {% endif %}
</div>
{% endblock %}
